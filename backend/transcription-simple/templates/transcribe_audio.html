<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Transcriber</title>
    <!-- Link to CSS -->
    <link rel="stylesheet" href="{{  url_for('static', path='css/style.css') }}">
    <!-- Link to Box Icons -->
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
    <!-- Linking Box Icon for Icons -->
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>
<body>

    <!-- CONTAINER -->
    <main class="container">

        <!-- TITLE -->
        <div class="title">
            <div class="title__logo">
                <box-icon class="title__icon" type='solid' name='magic-wand'></box-icon>
                <span class="title__text">Speech Transcriber</span>
            </div>

            <div class="title__action">
                <button class="settings-button btn" id="settingsBtn " onclick="openSettingsModal()">
                    <box-icon name='cog'></box-icon>
                    <span class="title__action-text">Settings</span>
                </button>
            </div>

        </div>

        <div class="audio__input">
            <div class="audio">
                <audio src="{{ audio_url }}" class="audio-player" id="audioPlayer" data-audio-id="{{ audio_id }}" controls></audio>
            </div>

            <div class="audio-edit__action">
                <button class="edit-audio-button btn" id="editAudioBtn " onclick="openAudioEditModal()">
                    <box-icon name='edit'></box-icon>
                    <span>Edit Audio</span>
                </button>
            </div>
        </div>

        <div class="form-input">
            <div class="transcription-input">
                <textarea class="form-container__transcription-input" id="transcription" rows="12"
                    placeholder="Transcription will appear here..."></textarea>
            </div>
            <div class="form-controls">

                <div class="form-container__audio-tags">
                    {% for tag in tags %}
                    <div class="audio-tags__tag" id="tag{{ tag.id }}" data-tag-id="{{ tag.id }}">
                        {{ tag.name }}
                    </div>
                    {% endfor %}
                </div>

                <div class="form-container__dropdown-group">
                    <!-- DROPDOWN GENDER -->
                    <select class="form-container__dropdown form-input" id="dropdownGender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>

                    <!-- DROPDOWN ACCENT -->
                    <select class="form-container__dropdown form-input" id="dropdownAccent">
                        {% for accent in accents %}
                        <option value="{{ accent.id }}">{{ accent.name }}</option>
                        {% endfor %}
                    </select>

                    <!-- DROPDOWN SPEAKER -->
                    <select class="form-container__dropdown form-input" id="dropdownSpeaker">
                        {% for speaker in speakers %}
                        <option value="{{ speaker.id }}">{{ speaker.name }}</option>
                        {% endfor %}
                    </select>

                    <button class="tag-button btn" id="createtagBtn" onclick="openTagModal()">
                        <!--TAG BUTTON-->
                        <box-icon name='plus'></box-icon>
                        <span>Tag</span>
                    </button>
                </div>

                <!-- SUBMIT TRANSCRIPT BUTTON -->
                <button class="form-container__button btn" onclick="submitTranscript()">
                    <box-icon type='solid' name='magic-wand'></box-icon>
                    Submit Transcript
                </button>

            </div>
        </div>

        <script src="{{ url_for('static', path='js/main.js') }}"></script>
    </main>
    
</body>
</html>
