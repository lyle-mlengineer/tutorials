<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timesnap Dataset</title>
    <!--=============== REMIXICONS ===============-->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
      <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container">

        <!-- TITLE -->
        <div class="title">
            <div class="title__logo">
                <box-icon class="title__icon" type='solid' name='magic-wand'></box-icon>
                <span class="title__text">TimeSnap</span>
            </div>

            <div class="title__action">
                <button class="create_dataset-button btn" id="createDatasetBtn">
                    <box-icon name='plus'></box-icon>
                    <span>Create Dataset</span>
                </button>
            </div>
            
        </div>

        <div class="form-and-extraction">

            <!-- FORM CONTAINER -->
            <div class="form-container">
                <div class="form-group">
                    <label for="dataset">Dataset Name:</label>
                    <div class="custom-input">
                        <select class="form-container__dropdown" id="dataset">
                            <option value="default">Default</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="type">Type:</label>
                    <div class="custom-input">
                        <select class="form-container__dropdown" id="type">
                            <option value="video">YouTube Video</option>
                            <option value="playlist">YouTube Playlist</option>
                            <option value="channel">YouTube Channel</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="url">Link:</label>
                    <div class="custom-input">
                        <input type="url" name="url" placeholder="Enter video URL here..." autocomplete="off">
                        <i class='bx bx-lock-alt'></i>
                    </div>
                </div>
                
                <div class="form-container__button" id="extractBtn">
                    <button class="extract-button btn">
                        <box-icon type='solid' name='magic-wand'></box-icon>
                        Extract
                    </button>
                    
                </div>

                <div class="extraction-container__loading-container" id="loadingContainer">
                    <div class="extraction-container__loading-spinner"></div>
                    <span>Searching...</span>
                </div>
            </div>

        </div>

    </main>

    <div class="extraction-modal modal">
        <div class="modal__content">
            <div class="modal__header">
               <h3>Extract Timestamps</h3>
            </div>
            <div class="modal__body">
                <p class="modal__decription">
                    <span>"Video Title"</span> scheduled for extraction!
                </p>
                <div class="image-container" id="imageResultContainer">
                    <img class="image-container__image-result-image show" id="imageResult" src="img/example.jpeg">
                </div>
                <div class="modal__actions">
                    <button class="btn" id="confirmBtn">Ok</button>
                </div>
            </div>
        </div>
    </div>

    <div class="dataset-creation-modal modal">
        <div class="modal__content">
            <div class="modal__header">
               <h3>Create Dataset</h3>
            </div>
            <div class="modal__body">
                <div class="form-group">
                    <label for="dataset">Name:</label>
                    <div class="custom-input">
                        <select class="form-container__dropdown" id="dataset">
                            <option value="default">Default</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="dataset">Description:</label>
                    <div class="custom-input">
                        <textarea name="" id="" rows="5" placeholder="Describe your dataset..."></textarea>
                    </div>
                </div>
                <div class="modal__actions">
                    <button class="btn" id="confirmBtn">Create</button>
                    <button class="btn" id="confirmBtn">Cancel</button>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
